name: delivery
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  http: ^1.1.0
  dartz: ^0.10.1
  shared_preferences: ^2.2.3
  image_picker: ^1.0.7
  url_launcher: ^6.3.1
  flutter_local_notifications: ^17.0.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logoApp.png"


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/

